- name: create roboshop system user
  ansible.builtin.user:
    name: roboshop
    comment: Roboshop system User
    system: true
    shell: /sbin/nologin
    home: /app
# safe to remove directory, because 2nd time if we run it will download freshly. no error if it doesnot exist

- name: remove app directory if exists
  ansible.builtin.file:
    path: /app
    state: absent

- name: create app directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: delete {{ component }} file
  ansible.builtin.file:
    path: /tmp/{{ component }}.zip
    state: absent

- name: download {{ component }} application
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip
    dest: /tmp/{{ component }}.zip

- name: extract {{ component }} application
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: yes
